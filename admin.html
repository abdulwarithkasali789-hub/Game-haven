<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Haven Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  padding:20px;
  font-family:Arial;
  background:#0b0f19;
  color:#e5e7eb;
}

h1{
  text-align:center;
  color:#00ff88;
}

.dashboard{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin:20px 0;
}

.box{
  background:#111827;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

form{
  max-width:520px;
  margin:20px auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:#111827;
  padding:15px;
  border-radius:12px;
}

input{
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.add{ background:#00ff88; }

.controls{
  max-width:700px;
  margin:10px auto;
  display:flex;
  gap:10px;
}

.card{
  background:#111827;
  padding:15px;
  margin:10px auto;
  max-width:700px;
  border-radius:10px;
}

img{
  width:100%;
  max-height:200px;
  object-fit:cover;
  border-radius:10px;
  margin-top:10px;
}

.delete{ background:red; color:white; margin-right:5px; }
.markSold{ background:#4da3ff; color:white; margin-right:5px; }

.pagination{
  text-align:center;
  margin:20px;
}

button.pageBtn{
  margin:5px;
  padding:5px 10px;
}

.soldTag{ color:red; font-weight:bold; }
</style>
</head>

<body>

<h1>GAME HAVEN ADMIN PANEL</h1>

<script>
let pass = prompt("Enter Admin Password:");
if(pass !== "hvcked"){
  alert("Access Denied");
  window.location.href="index.html";
}
</script>

<!-- DASHBOARD -->
<div class="dashboard">
  <div class="box" id="totalBox">Total: 0</div>
  <div class="box" id="soldBox">Sold: 0</div>
  <div class="box" id="revenueBox">Revenue: $0</div>
</div>

<!-- SEARCH / FILTER -->
<div class="controls">
  <input id="search" placeholder="Search accounts...">

  <select id="filter">
    <option value="all">All</option>
    <option value="sold">Sold</option>
    <option value="unsold">Unsold</option>
  </select>
</div>

<!-- FORM -->
<form id="form">
<input type="text" id="title" placeholder="Account Title" required>
<input type="text" id="game_name" placeholder="Game Name" required>
<input type="email" id="account_details" placeholder="Account Email" required>
<input type="number" id="price" placeholder="Price" required>
<input type="text" id="image_url" placeholder="Image URL" required>
<button class="add">Add Account</button>
</form>

<div id="list"></div>
<div class="pagination" id="pagination"></div>

<script>

const supabase = window.supabase.createClient(
  "https://xuxflsuixgiwdvawhhbi.supabase.co",
  "YOUR_ANON_KEY"
);

let allData = [];
let page = 1;
let limit = 5;

/* ADD */
document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const title = document.getElementById("title").value;
  const game_name = document.getElementById("game_name").value;
  const account_details = document.getElementById("account_details").value;
  const price = parseFloat(document.getElementById("price").value);
  const image_url = document.getElementById("image_url").value;

  await supabase.from("game_accounts").insert([{
    title,
    game_name,
    account_details,
    price,
    image_url,
    is_sold:false
  }]);

  e.target.reset();
  load();
});

/* LOAD */
async function load(){
  const { data } = await supabase.from("game_accounts").select("*");
  allData = data || [];
  render();
  updateDashboard();
}

/* DASHBOARD */
function updateDashboard(){
  const total = allData.length;
  const sold = allData.filter(i=>i.is_sold).length;
  const revenue = allData
    .filter(i=>i.is_sold)
    .reduce((sum,i)=>sum + Number(i.price),0);

  document.getElementById("totalBox").innerText = "Total: " + total;
  document.getElementById("soldBox").innerText = "Sold: " + sold;
  document.getElementById("revenueBox").innerText = "Revenue: $" + revenue;
}

/* FILTER + SEARCH */
function getFiltered(){
  let data = [...allData];

  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  if(search){
    data = data.filter(i =>
      i.title.toLowerCase().includes(search) ||
      i.game_name.toLowerCase().includes(search)
    );
  }

  if(filter === "sold") data = data.filter(i=>i.is_sold);
  if(filter === "unsold") data = data.filter(i=>!i.is_sold);

  return data;
}

/* PAGINATION */
function paginate(data){
  const start = (page-1)*limit;
  return data.slice(start, start+limit);
}

/* RENDER */
function render(){
  let data = getFiltered();
  const paginated = paginate(data);

  const list = document.getElementById("list");
  list.innerHTML = "";

  paginated.forEach(i=>{
    list.innerHTML += `
      <div class="card">
        <h3>${i.title}</h3>
        <p>${i.game_name}</p>
        <p>${i.account_details}</p>
        <p>$${i.price}</p>

        <img src="${i.image_url}" />

        ${i.is_sold ? `<p class="soldTag">SOLD</p>` : ""}

        <button class="markSold" onclick="markSold('${i.id}')">MARK SOLD</button>
        <button class="delete" onclick="del('${i.id}')">DELETE</button>
      </div>
    `;
  });

  renderPagination(data);
}

/* PAGINATION UI */
function renderPagination(data){
  const pages = Math.ceil(data.length / limit);
  const pag = document.getElementById("pagination");
  pag.innerHTML = "";

  for(let i=1;i<=pages;i++){
    pag.innerHTML += `<button class="pageBtn" onclick="go(${i})">${i}</button>`;
  }
}

function go(p){
  page = p;
  render();
}

/* DELETE */
async function del(id){
  await supabase.from("game_accounts").delete().eq("id",id);
  load();
}

/* MARK SOLD */
async function markSold(id){
  await supabase.from("game_accounts")
    .update({is_sold:true})
    .eq("id",id);

  load();
}

/* EVENTS */
document.getElementById("search").addEventListener("input", render);
document.getElementById("filter").addEventListener("change", render);

load();

</script>

</body>
</html>
