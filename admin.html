<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Haven Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  padding:20px;
  font-family:Arial;
  background:#0b0f19;
  color:#e5e7eb;
}

h1{text-align:center;color:#00ff88;}

form{
  max-width:520px;
  margin:20px auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:#111827;
  padding:15px;
  border-radius:12px;
}

input{
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.add{ background:#00ff88; }
.delete{ background:red; color:white; }
.sold{ background:#4da3ff; color:white; }

.card{
  background:#111827;
  padding:15px;
  margin:10px auto;
  max-width:700px;
  border-radius:10px;
}

img{
  width:100%;
  max-height:200px;
  object-fit:cover;
  border-radius:10px;
  margin-top:10px;
}

#search{
  display:block;
  margin:10px auto;
  padding:10px;
  width:300px;
  border-radius:8px;
  border:none;
}

#list{
  display:none; /* hidden by default */
}

.soldTag{ color:red; font-weight:bold; }
</style>
</head>

<body>

<h1>GAME HAVEN ADMIN PANEL</h1>

<script>
let pass = prompt("Enter Admin Password:");
if(pass !== "hvcked"){
  alert("Access Denied");
  window.location.href="index.html";
}
</script>

<!-- SHOW / HIDE BUTTON -->
<div style="text-align:center;">
  <button onclick="toggleList()">Show / Hide Accounts</button>
</div>

<input id="search" placeholder="Search accounts...">

<form id="form">
<input type="text" id="title" placeholder="Account Title" required>
<input type="text" id="game_name" placeholder="Game Name" required>
<input type="email" id="account_details" placeholder="Account Email" required>
<input type="number" id="price" placeholder="Price" required>
<input type="text" id="image_url" placeholder="Image URL" required>

<button type="submit" class="add">Add Account</button>
</form>

<div id="list"></div>

<script>

const supabase = window.supabase.createClient(
  "https://xuxflsuixgiwdvawhhbi.supabase.co",
  "YOUR_ANON_KEY"
);

let allData = [];

/* TOGGLE FIX */
function toggleList(){
  const list = document.getElementById("list");
  list.style.display = list.style.display === "none" ? "block" : "none";
}

/* ADD FIX (NO RELOAD) */
document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  await supabase.from("game_accounts").insert([{
    title: title.value,
    game_name: game_name.value,
    account_details: account_details.value,
    price: parseFloat(price.value),
    image_url: image_url.value,
    is_sold:false
  }]);

  form.reset();
  load();
});

/* LOAD */
async function load(){
  const { data } = await supabase.from("game_accounts").select("*");
  allData = data || [];
  render();
}

/* SEARCH FIX */
document.getElementById("search").addEventListener("input", render);

/* RENDER FIX */
function render(){
  const value = document.getElementById("search").value.toLowerCase();

  const filtered = allData.filter(i =>
    i.title.toLowerCase().includes(value) ||
    i.game_name.toLowerCase().includes(value)
  );

  list.innerHTML = "";

  filtered.forEach(i => {
    list.innerHTML += `
      <div class="card">
        <h3>${i.title}</h3>
        <p>${i.game_name}</p>
        <p>${i.account_details}</p>
        <p>$${i.price}</p>

        <img src="${i.image_url}">

        ${i.is_sold ? `<p class="soldTag">SOLD</p>` : ""}

        <button class="sold" onclick="markSold('${i.id}')">MARK SOLD</button>
        <button class="delete" onclick="del('${i.id}')">DELETE</button>
      </div>
    `;
  });
}

/* DELETE */
async function del(id){
  await supabase.from("game_accounts").delete().eq("id", id);
  load();
}

/* SOLD */
async function markSold(id){
  await supabase.from("game_accounts")
    .update({ is_sold:true })
    .eq("id", id);

  load();
}

load();

</script>

</body>
</html>
