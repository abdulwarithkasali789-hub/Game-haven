<html lang="en">
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#0a0a0a;color:white;font-family:sans-serif;padding:20px;}
h1{text-align:center;color:#33ff00;}
.container{max-width:600px;margin:auto;background:#111;padding:20px;border-radius:12px;border:2px solid #33ff00;}
input,textarea{width:100%;padding:12px;margin-top:10px;background:#222;border:1px solid #333;color:white;border-radius:6px;}
button{width:100%;padding:12px;margin-top:15px;background:#33ff00;border:none;border-radius:8px;font-weight:bold;cursor:pointer;}
.toast{position:fixed;bottom:20px;right:20px;background:#33ff00;color:black;padding:12px 20px;border-radius:8px;opacity:0;transition:0.5s;}
.toast.error{background:#ff4444;color:white;}
.debug{margin-top:10px;color:#33ff00;font-size:12px;}
</style>
</head>

<body>

<div class="container">
<h1>Game Haven Admin</h1>

<input id="title" placeholder="Listing Title">
<input id="game" placeholder="Game Name">
<input id="price" type="number" placeholder="Price USD">
<input id="image" placeholder="Image URL">

<textarea id="accounts" rows="5" placeholder="email:password (one per line)"></textarea>

<button onclick="uploadAccounts()">Upload Accounts</button>

<div id="debug" class="debug"></div>
</div>

<div id="toast" class="toast"></div>

<script>

// 🔥 PASTE YOUR ANON KEY BELOW
const supabase = window.supabase.createClient(
  "https://xuxflsuixgiwdvawhhbi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eGZsc3VpeGdpd2R2YXdoaGJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwOTM1MzksImV4cCI6MjA4ODY2OTUzOX0.pIUE56lEoJXUsCvFIDdyeg8wYL4QeTuEeIr-N4kGV8c"
);

function toast(msg,type="success"){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.className="toast"+(type==="error"?" error":"");
  t.style.opacity="1";
  setTimeout(()=>t.style.opacity="0",2500);
}

function debug(msg){
  document.getElementById("debug").innerText = msg;
}

async function uploadAccounts(){

  alert("Button clicked"); // ✅ confirms button works

  let title=document.getElementById("title").value.trim();
  let game=document.getElementById("game").value.trim();
  let price=document.getElementById("price").value.trim();
  let image=document.getElementById("image").value.trim();
  let list=document.getElementById("accounts").value.split("\n").filter(x=>x.trim()!="");

  if(!title||!game||!price||!list.length){
    toast("Fill all fields!","error");
    debug("Missing fields");
    return;
  }

  let rows=list.map(acc=>({
    title:title,
    game_name:game,
    price:parseFloat(price),
    account_details:acc,
    image_url:image,
    is_sold:false
  }));

  debug("Uploading...");

  try{
    let {error}=await supabase.from("game_accounts").insert(rows);

    if(error){
      toast("Upload failed","error");
      debug(error.message);
    }else{
      toast("Upload success");
      debug("Uploaded "+rows.length+" accounts");
    }

  }catch(e){
    toast("Error occurred","error");
    debug(e.message);
  }
}

</script>

</body>
</html>
