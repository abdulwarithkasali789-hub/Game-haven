<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GH Admin | Upload</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .admin-card { background: #111; border: 2px solid #33ff00; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 0 20px rgba(51, 255, 0, 0.1); }
        h2 { color: #33ff00; text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; }
        label { display: block; margin: 15px 0 5px; color: #888; font-size: 0.8rem; text-transform: uppercase; }
        input, select, textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 8px; color: #fff; box-sizing: border-box; outline: none; }
        input:focus { border-color: #33ff00; }
        button { width: 100%; background: #33ff00; color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 25px; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #2bd400; transform: scale(1.02); }
        button:disabled { background: #444; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2>GH Admin Panel</h2>
        
        <label>Listing Title</label>
        <input type="text" id="title" placeholder="e.g. OG Ghoul Trooper Account">

        <label>Game Category</label>
        <select id="game_name">
            <option value="FORTNITE">Fortnite</option>
            <option value="PUBG">PUBG</option>
            <option value="ROBLOX">Roblox</option>
            <option value="COD">Call of Duty</option>
        </select>

        <label>Price (USD)</label>
        <input type="number" id="price" placeholder="50">

        <label>Account Details (Credentials)</label>
        <textarea id="details" rows="3" placeholder="email:password"></textarea>

        <button id="uploadBtn" onclick="uploadToVault()">Upload to Vault</button>
    </div>

<script>
    // Your Project Credentials
    const S_URL = "https://xuxflsuixgiwdvawhhbi.supabase.co"; 
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eGZsc3VpeGdpd2R2YXdoaGJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwOTM1MzksImV4cCI6MjA4ODY2OTUzOX0.pIUE56lEoJXUsCvFIDdyeg8wYL4QeTuEeIr-N4kGV8c";

    const supabaseClient = supabase.createClient(S_URL, S_KEY);

    async function uploadToVault() {
        const btn = document.getElementById('uploadBtn');
        const title = document.getElementById('title').value;
        const game = document.getElementById('game_name').value;
        const price = document.getElementById('price').value;
        const details = document.getElementById('details').value;

        if(!title || !price || !details) {
            alert("Please fill in all fields!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Uploading...";

        try {
            const { data, error } = await supabaseClient
                .from('game_accounts')
                .insert([
                    { 
                        title: title, 
                        game_name: game, 
                        price: parseFloat(price), 
                        details: details,
                        is_sold: false 
                    }
                ]);

            if (error) throw error;

            alert("Success! Account is now live in the Vault.");
            // Clear form
            document.getElementById('title').value = "";
            document.getElementById('price').value = "";
            document.getElementById('details').value = "";

        } catch (err) {
            alert("Error: " + err.message);
            console.error(err);
        } finally {
            btn.disabled = false;
            btn.innerText = "Upload to Vault";
        }
    }
</script>
</body>
</html>
