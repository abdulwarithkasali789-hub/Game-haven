<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Haven | Admin</title>

<script>
(function(){
let pass = prompt("Enter Admin Password:");
if(pass !== "hvcked"){
alert("Access Denied");
window.location.href="index.html";
}
})();
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#0a0a0a;
color:white;
font-family:sans-serif;
padding:20px;
}

h1{
color:#33ff00;
text-align:center;
}

.container{
max-width:600px;
margin:auto;
background:#111;
padding:20px;
border-radius:12px;
border:2px solid #33ff00;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
background:#222;
border:1px solid #333;
color:white;
border-radius:6px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#33ff00;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.list{
margin-top:40px;
}

.item{
background:#111;
border:1px solid #333;
padding:15px;
margin-bottom:10px;
border-radius:8px;
}

.smallbtn{
width:auto;
padding:6px 10px;
margin-right:6px;
font-size:12px;
}

.delete{
background:#ff4444;
color:white;
}

.sold{
background:orange;
}

</style>
</head>

<body>

<div class="container">

<h1>Game Haven Admin</h1>

<input id="title" placeholder="Listing Title">

<input id="game" placeholder="Game Name">

<input id="price" type="number" placeholder="Price USD">

<input id="image" placeholder="Image URL">

<textarea id="accounts" rows="5" placeholder="email:password (one per line)"></textarea>

<button onclick="upload()">Upload Accounts</button>

</div>

<div class="list" id="accountList"></div>

<script>

const supabase = window.supabase.createClient(
"https://xuxflsuixgiwdvawhhbi.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eGZsc3VpeGdpd2R2YXdoaGJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwOTM1MzksImV4cCI6MjA4ODY2OTUzOX0.pIUE56lEoJXUsCvFIDdyeg8wYL4QeTuEeIr-N4kGV8c"
);

async function upload(){

let title=document.getElementById("title").value
let game=document.getElementById("game").value
let price=document.getElementById("price").value
let image=document.getElementById("image").value
let list=document.getElementById("accounts").value.split("\n")

if(!title||!game||!price||!list[0]){
alert("Fill all fields")
return
}

let rows=list.filter(x=>x.trim()!="").map(acc=>({
title:title,
game_name:game,
price:price,
account_details:acc,
image_url:image,
is_sold:false
}))

let {error}=await supabase.from("game_accounts").insert(rows)

if(error){
alert(error.message)
}else{
alert("Uploaded "+rows.length+" accounts")
load()
}

}

async function load(){

let {data}=await supabase
.from("game_accounts")
.select("*")
.order("id",{ascending:false})

let box=document.getElementById("accountList")

if(!data||data.length==0){
box.innerHTML="<p>No accounts yet</p>"
return
}

box.innerHTML=""

data.forEach(acc=>{

box.innerHTML+=`

<div class="item">

<b>${acc.title}</b><br>

Game: ${acc.game_name}<br>

Price: $${acc.price}<br>

Account: ${acc.account_details}<br>

Status: ${acc.is_sold?"SOLD":"AVAILABLE"}<br><br>

<button class="smallbtn sold" onclick="markSold(${acc.id})">Mark Sold</button>

<button class="smallbtn delete" onclick="deleteAcc(${acc.id})">Delete</button>

</div>

`

})

}

async function markSold(id){

await supabase
.from("game_accounts")
.update({is_sold:true})
.eq("id",id)

load()

}

async function deleteAcc(id){

await supabase
.from("game_accounts")
.delete()
.eq("id",id)

load()

}

load()

</script>

</body>
</html>
