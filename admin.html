<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Haven | Admin Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
<style>
  body{background:#0a0a0a;color:white;font-family:sans-serif;margin:0;padding:20px;}
  h1{text-align:center;color:#33ff00;text-shadow:0 0 10px #33ff00;margin-bottom:30px;}
  form{max-width:500px;margin:0 auto;display:flex;flex-direction:column;gap:15px;}
  input, select{padding:12px;border-radius:8px;border:none;font-size:1rem;}
  button{padding:12px;background:#33ff00;color:black;font-weight:bold;border:none;border-radius:8px;cursor:pointer;}
  #status{text-align:center;color:#888;margin-top:20px;}
</style>
</head>
<body>

<h1>GAME HAVEN | Admin</h1>

<script>
  // Simple login prompt
  let pwd = prompt("Enter Admin Password:");
  if(pwd !== "hvcked"){
    alert("Access Denied");
    window.location.href="index.html";
  }
</script>

<form id="gameForm">
  <input type="text" id="title" placeholder="Game Title" required>
  <input type="text" id="gameName" placeholder="Game Name / Description" required>
  <input type="number" id="price" placeholder="Price ($)" required>
  <select id="category" required>
    <option value="">Select Category</option>
    <option value="PS4">PS4</option>
    <option value="PS5">PS5</option>
    <option value="PC">PC</option>
    <option value="Xbox">Xbox</option>
  </select>
  <input type="text" id="imageUrl" placeholder="Paste Image URL Here" required>
  <button type="submit">Add Game</button>
</form>

<div id="status">Status: Waiting for input...</div>

<script>
const supabase = window.supabase.createClient(
  "https://xuxflsuixgiwdvawhhbi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eGZsc3VpeGdpd2hhd2h0aWQiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc3MzA5MzUzOSwiZXhwIjoyMDg4NjY5NTM5fQ.pIUE56lEoJXUsCvFIDdyeg8wYL4QeTuEeIr-N4kGV8c"
);

const form = document.getElementById("gameForm");
const status = document.getElementById("status");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  status.innerText = "Adding game...";

  const title = document.getElementById("title").value;
  const gameName = document.getElementById("gameName").value;
  const price = parseFloat(document.getElementById("price").value);
  const category = document.getElementById("category").value;
  const imageUrl = document.getElementById("imageUrl").value;

  try {
    const { data, error } = await supabase.from('game_accounts').insert([
      { title, game_name: gameName, price, category, image_url: imageUrl, is_sold: false }
    ]);

    if(error){ status.innerText="Database Error: "+error.message; return; }

    status.innerText="Game added successfully!";
    form.reset();

  } catch(err){
    status.innerText = "System Error: " + err.message;
  }
});
</script>

</body>
</html>
