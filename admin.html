<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Haven Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>

<style>
body{
  margin:0;
  padding:20px;
  font-family:Arial;
  background:#0b0f19;
  color:#e5e7eb;
}

h1{
  text-align:center;
  color:#00ff88;
}

form{
  max-width:520px;
  margin:20px auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:#111827;
  padding:15px;
  border-radius:12px;
}

input, select{
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.add{
  background:#00ff88;
}

.delete{
  background:red;
  color:white;
  margin-right:5px;
}

.sold{
  background:#4da3ff;
  color:white;
}

.card{
  background:#111827;
  padding:15px;
  margin:10px auto;
  max-width:700px;
  border-radius:10px;
  border:1px solid #1f2937;
}

.soldTag{
  color:red;
  font-weight:bold;
}

#status{
  text-align:center;
  color:#aaa;
}
</style>
</head>

<body>

<h1>GAME HAVEN ADMIN PANEL</h1>

<script>
let pass = prompt("Enter Admin Password:");
if(pass !== "hvcked"){
  alert("Access Denied");
  window.location.href = "index.html";
}
</script>

<form id="form">

<input type="text" id="title" placeholder="Account Title" required>

<select id="game_name" required>
  <option value="">Select Game</option>
  <option value="COD">COD</option>
  <option value="GTA">GTA</option>
  <option value="FIFA">FIFA</option>
  <option value="PUBG">PUBG</option>
  <option value="FF">Free Fire</option>
</select>

<input type="email" id="account_details" placeholder="Account Email" required>

<input type="number" id="price" placeholder="Price" required>

<input type="text" id="image_url" placeholder="Image URL" required>

<button class="add" type="submit">Add Account</button>

</form>

<div id="status">Loading...</div>

<h2 style="text-align:center;">All Accounts</h2>
<div id="list"></div>

<script>

const supabase = window.supabase.createClient(
  "https://xuxflsuixgiwdvawhhbi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eGZsc3VpeGdpd2R2YXdoaGJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwOTM1MzksImV4cCI6MjA4ODY2OTUzOX0.pIUE56lEoJXUsCvFIDdyeg8wYL4QeTuEeIr-N4kGV8c"
);

const form = document.getElementById("form");
const list = document.getElementById("list");
const status = document.getElementById("status");

/* ADD */
form.addEventListener("submit", async (e) => {
  e.preventDefault();
  status.innerText = "Uploading...";

  const title = document.getElementById("title").value;
  const game_name = document.getElementById("game_name").value;
  const account_details = document.getElementById("account_details").value;
  const price = parseFloat(document.getElementById("price").value);
  const image_url = document.getElementById("image_url").value;

  const { error } = await supabase.from("game_accounts").insert([
    {
      title,
      game_name,
      account_details,
      price,
      image_url,
      is_sold: false
    }
  ]);

  if(error){
    status.innerText = "Error: " + error.message;
  } else {
    status.innerText = "Uploaded successfully";
    form.reset();
    load();
  }
});

/* LOAD */
async function load(){
  const { data } = await supabase
    .from("game_accounts")
    .select("*")
    .order("created_at", { ascending: false });

  render(data);
}

/* RENDER */
function render(items){
  list.innerHTML = "";

  items.forEach(i => {
    list.innerHTML += `
      <div class="card">
        <h3>${i.title}</h3>
        <p>Game: ${i.game_name}</p>
        <p>Email: ${i.account_details}</p>
        <p>Price: $${i.price}</p>

        ${i.is_sold ? `<p class="soldTag">SOLD</p>` : ""}

        <button class="delete" onclick="del('${i.id}')">DELETE</button>
        <button class="sold" onclick="sold('${i.id}')">MARK SOLD</button>
      </div>
    `;
  });
}

/* DELETE */
async function del(id){
  await supabase.from("game_accounts").delete().eq("id", id);
  load();
}

/* SOLD */
async function sold(id){
  await supabase.from("game_accounts")
    .update({ is_sold: true })
    .eq("id", id);

  load();
}

load();

</script>

</body>
</html>
