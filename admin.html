<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Haven | Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body{background:#0a0a0a;color:white;font-family:sans-serif;padding:20px;}
        h1{text-align:center;color:#33ff00;}
        .container{max-width:600px;margin:auto;background:#111;padding:20px;border-radius:12px;border:2px solid #33ff00;}
        input,textarea{width:100%;padding:12px;margin-top:10px;background:#222;border:1px solid #333;color:white;border-radius:6px;box-sizing:border-box;}
        button{width:100%;padding:12px;margin-top:15px;background:#33ff00;border:none;border-radius:8px;font-weight:bold;cursor:pointer;color:black;}
        .debug{margin-top:10px;color:#33ff00;font-size:12px;text-align:center;}
    </style>
</head>
<body>

<div class="container">
    <h1>Game Haven Admin</h1>

    <input id="title" placeholder="Listing Title">
    <input id="game" placeholder="Game Name">
    <input id="price" type="number" placeholder="Price USD">
    <input id="image" placeholder="Image URL (Optional)">
    <textarea id="accounts" rows="5" placeholder="email:password (one per line)"></textarea>

    <button onclick="uploadAccounts()">Upload Accounts</button>

    <div id="debug" class="debug">Status: Ready</div>
</div>

<script>
// 1. Setup the connection to your Supabase
const supabase = window.supabase.createClient(
  "https://xuxflsuixgiwdvawhhbi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eGZsc3VpeGdpd2R2YXdoaGJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwOTM1MzksImV4cCI6MjA4ODY2OTUzOX0.pIUE56lEoJXUsCvFIDdyeg8wYL4QeTuEeIr-N4kGV8c"
);

// 2. This is the function the button calls
async function uploadAccounts() {
    // Alert 1: Proves the button is working
    alert("Step 1: Button clicked! Starting upload...");

    try {
        const t = document.getElementById("title").value.trim();
        const g = document.getElementById("game").value.trim();
        const p = document.getElementById("price").value.trim();
        const img = document.getElementById("image").value.trim();
        const accs = document.getElementById("accounts").value.trim();

        if (!t || !g || !p || !accs) {
            alert("Error: Please fill in all boxes!");
            return;
        }

        const list = accs.split("\n").filter(x => x.trim() !== "");
        
        // Match your database columns exactly
        const rows = list.map(item => ({
            title: t,
            game_name: g,
            price: parseFloat(p),
            account_details: item,
            image_url: img || null,
            is_sold: false
        }));

        document.getElementById("debug").innerText = "Status: Uploading...";

        // Send to Supabase
        const { error } = await supabase.from("game_accounts").insert(rows);

        if (error) {
            alert("DATABASE ERROR: " + error.message);
            document.getElementById("debug").innerText = "Status: Failed";
        } else {
            alert("SUCCESS! " + rows.length + " accounts added to the database.");
            document.getElementById("debug").innerText = "Status: Success!";
            document.getElementById("accounts").value = ""; // Clear the box
        }

    } catch (err) {
        alert("CRITICAL ERROR: " + err.message);
    }
}
</script>

</body>
</html>
