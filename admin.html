<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Haven Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  padding:20px;
  font-family:Arial;
  background:#0b0f19;
  color:#e5e7eb;
}

h1{text-align:center;color:#00ff88;}

.dashboard{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin:20px 0;
}

.box{
  background:#111827;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

form{
  max-width:520px;
  margin:20px auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:#111827;
  padding:15px;
  border-radius:12px;
}

input{
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.add{ background:#00ff88; }

.controls{
  max-width:700px;
  margin:10px auto;
  display:flex;
  gap:10px;
}

.card{
  background:#111827;
  padding:15px;
  margin:10px auto;
  max-width:700px;
  border-radius:10px;
}

img{
  width:100%;
  max-height:200px;
  object-fit:cover;
  border-radius:10px;
  margin-top:10px;
}

.delete{ background:red; color:white; margin-right:5px; }
.markSold{ background:#4da3ff; color:white; margin-right:5px; }

.hidden{ display:none; }

.soldTag{ color:red; font-weight:bold; }
</style>
</head>

<body>

<h1>GAME HAVEN ADMIN PANEL</h1>

<script>
// ✅ FIXED LOGIN (runs once only)
if(sessionStorage.getItem("admin") !== "true"){
  let pass = prompt("Enter Admin Password:");
  if(pass === "hvcked"){
    sessionStorage.setItem("admin","true");
  } else {
    alert("Access Denied");
    window.location.href="index.html";
  }
}
</script>

<!-- DASHBOARD -->
<div class="dashboard">
  <div class="box" id="totalBox">Total: 0</div>
  <div class="box" id="soldBox">Sold: 0</div>
  <div class="box" id="revenueBox">Revenue: $0</div>
</div>

<!-- BUTTON TO SHOW ACCOUNTS -->
<div style="text-align:center;">
  <button onclick="toggleList()">Show / Hide Accounts</button>
</div>

<!-- SEARCH -->
<div class="controls">
  <input id="search" placeholder="Search accounts...">
</div>

<!-- FORM -->
<form id="form">
<input type="text" id="title" placeholder="Account Title" required>
<input type="text" id="game_name" placeholder="Game Name" required>
<input type="email" id="account_details" placeholder="Account Email" required>
<input type="number" id="price" placeholder="Price" required>
<input type="text" id="image_url" placeholder="Image URL" required>
<button class="add">Add Account</button>
</form>

<div id="list" class="hidden"></div>

<script>

const supabase = window.supabase.createClient(
  "https://xuxflsuixgiwdvawhhbi.supabase.co",
  "YOUR_ANON_KEY"
);

let allData = [];
let visible = false;

/* TOGGLE LIST */
function toggleList(){
  visible = !visible;
  document.getElementById("list").classList.toggle("hidden");
}

/* ADD */
document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const title = document.getElementById("title").value;
  const game_name = document.getElementById("game_name").value;
  const account_details = document.getElementById("account_details").value;
  const price = parseFloat(document.getElementById("price").value);
  const image_url = document.getElementById("image_url").value;

  await supabase.from("game_accounts").insert([{
    title,
    game_name,
    account_details,
    price,
    image_url,
    is_sold:false
  }]);

  e.target.reset();
  load();
});

/* LOAD */
async function load(){
  const { data } = await supabase.from("game_accounts").select("*");
  allData = data || [];
  render();
  updateDashboard();
}

/* DASHBOARD */
function updateDashboard(){
  const total = allData.length;
  const sold = allData.filter(i=>i.is_sold).length;
  const revenue = allData
    .filter(i=>i.is_sold)
    .reduce((sum,i)=>sum + Number(i.price),0);

  totalBox.innerText = "Total: " + total;
  soldBox.innerText = "Sold: " + sold;
  revenueBox.innerText = "Revenue: $" + revenue;
}

/* SEARCH */
document.getElementById("search").addEventListener("input", render);

/* RENDER */
function render(){
  const search = document.getElementById("search").value.toLowerCase();

  let filtered = allData.filter(i =>
    i.title.toLowerCase().includes(search) ||
    i.game_name.toLowerCase().includes(search)
  );

  list.innerHTML = "";

  filtered.forEach(i=>{
    list.innerHTML += `
      <div class="card">
        <h3>${i.title}</h3>
        <p>${i.game_name}</p>
        <p>${i.account_details}</p>
        <p>$${i.price}</p>

        <img src="${i.image_url}">

        ${i.is_sold ? `<p class="soldTag">SOLD</p>` : ""}

        <button class="markSold" onclick="markSold('${i.id}')">MARK SOLD</button>
        <button class="delete" onclick="del('${i.id}')">DELETE</button>
      </div>
    `;
  });
}

/* DELETE */
async function del(id){
  await supabase.from("game_accounts").delete().eq("id",id);
  load();
}

/* MARK SOLD */
async function markSold(id){
  await supabase.from("game_accounts")
    .update({is_sold:true})
    .eq("id",id);

  load();
}

load();

</script>

</body>
</html>
