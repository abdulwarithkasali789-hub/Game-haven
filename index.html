<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Haven | Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        h1 { color: #33ff00; text-align: center; font-size: 2.5rem; text-shadow: 0 0 15px #33ff00; text-transform: uppercase; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 40px; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: auto; }
        .card { background: #111; border: 1px solid #333; padding: 25px; border-radius: 15px; transition: 0.3s; position: relative; overflow: hidden; }
        .card:hover { border-color: #33ff00; box-shadow: 0 0 20px #33ff0022; transform: translateY(-5px); }
        .tag { background: #33ff00; color: #000; padding: 5px 12px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; display: inline-block; }
        h3 { margin: 20px 0 10px 0; font-size: 1.4rem; color: #eee; }
        .price { font-size: 1.8rem; color: #33ff00; font-weight: bold; margin-bottom: 25px; display: block; }
        button { width: 100%; background: #33ff00; color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #2bd400; }
        #loading { text-align: center; color: #33ff00; font-weight: bold; margin-top: 50px; }
    </style>
</head>
<body>

    <h1>GAME HAVEN</h1>
    <div class="subtitle">PREMIUM ACCOUNTS VAULT</div>

    <div id="loading">Scanning the database...</div>
    <div class="grid" id="account-list"></div>

<script>
    const S_URL = "https://xuxflsuixgiwdvawhhbi.supabase.co"; 
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eGZsc3VpeGdpd2R2YXdoaGJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwOTM1MzksImV4cCI6MjA4ODY2OTUzOX0.pIUE56lEoJXUsCvFIDdyeg8wYL4QeTuEeIr-N4kGV8c";

    const supabaseClient = supabase.createClient(S_URL, S_KEY);

    async function loadAccounts() {
        const loadingDiv = document.getElementById('loading');
        const container = document.getElementById('account-list');

        try {
            const { data, error } = await supabaseClient
                .from('game_accounts')
                .select('*')
                .eq('is_sold', false);

            loadingDiv.style.display = "none";

            if (error) throw error;

            if (!data || data.length === 0) {
                container.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: #666;'>Vault is currently empty. Check back later!</p>";
                return;
            }

            data.forEach(acc => {
                const card = `
                    <div class="card">
                        <span class="tag">${acc.game_name}</span>
                        <h3>${acc.title}</h3>
                        <span class="price">$${acc.price}</span>
                        <button onclick="alert('Redirecting to secure payment...')">BUY NOW</button>
                    </div>
                `;
                container.innerHTML += card;
            });

        } catch (err) {
            loadingDiv.innerText = "Error loading data: " + err.message;
            console.error(err);
        }
    }

    loadAccounts();
</script>
</body>
</html>
