<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Haven | Marketplace</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#0a0a0a;color:white;font-family:sans-serif;margin:0;padding:20px;}
h1{text-align:center;color:#33ff00;text-shadow:0 0 10px #33ff00;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin-top:30px;}
.card{background:#111;border:1px solid #333;border-radius:12px;padding:20px;transition:.3s;}
.card:hover{border-color:#33ff00;box-shadow:0 0 15px #33ff0022;}
.card img{width:100%;border-radius:8px;margin-bottom:10px;}
.price{color:#33ff00;font-size:20px;font-weight:bold;}
button{width:100%;margin-top:10px;padding:12px;background:#33ff00;border:none;border-radius:8px;font-weight:bold;cursor:pointer;}
#modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;}
.modal-box{background:#111;padding:20px;border-radius:12px;width:300px;text-align:center;}
.modal-box a{display:block;margin:10px 0;padding:10px;background:#33ff00;color:black;text-decoration:none;border-radius:6px;font-weight:bold;}
</style>
</head>

<body>

<h1>GAME HAVEN</h1>
<div id="accounts" class="grid"></div>

<div id="modal">
<div class="modal-box">
<h3>Buy Account</h3>
<a id="whatsapp" target="_blank">WhatsApp</a>
<button onclick="closeModal()">Cancel</button>
</div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://xuxflsuixgiwdvawhhbi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1c2Vfcm9sZSIsImlhdCI6MTc3MzA5MzUzOSwiZXhwIjoyMDg4NjY5NTM5fQ.tD1MfScOE83YkaxCpS7PkWwW8UVAo-NwOYD4zu2bhb0"
);

async function loadAccounts(){
    const container = document.getElementById("accounts");
    const {data,error} = await supabase.from("game_accounts").select("*").eq("is_sold",false);

    if(error){ container.innerHTML="Error loading accounts"; console.log(error); return; }
    if(!data || data.length===0){ container.innerHTML="<p style='text-align:center;color:#888;'>Vault is empty!</p>"; return; }

    container.innerHTML="";

    // Group accounts by title+game+price+image
    const grouped = {};
    data.forEach(acc=>{
        const key = acc.title+"|"+acc.game_name+"|"+acc.price+"|"+(acc.image_url||"");
        if(!grouped[key]) grouped[key]=[];
        grouped[key].push(acc);
    });

    Object.keys(grouped).forEach(key=>{
        const [title,game,price,image] = key.split("|");
        const stockCount = grouped[key].length;

        container.innerHTML += `
        <div class="card">
            <img src="${image || 'https://via.placeholder.com/300x200'}">
            <h3>${title}</h3>
            <p>${game}</p>
            <div class="price">$${price}</div>
            <div>⚡ ${stockCount} Accounts Left</div>
            <button onclick="buyAccount('${title}',${price})">BUY NOW</button>
        </div>
        `;
    });
}

function buyAccount(title,price){
    document.getElementById("modal").style.display="flex";
    document.getElementById("whatsapp").href=
    "https://wa.me/234703689704?text=I want to buy "+encodeURIComponent(title)+" for $"+price;
}

function closeModal(){ document.getElementById("modal").style.display="none"; }

loadAccounts();
</script>

</body>
</html>
