<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Haven | Marketplace</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <style>
        body{background:#0a0a0a;color:white;font-family:sans-serif;margin:0;padding:20px;}
        h1{text-align:center;color:#33ff00;text-shadow:0 0 10px #33ff00;}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin-top:30px;}
        .card{background:#111;border:1px solid #33ff00;border-radius:12px;padding:20px;text-align:center;}
        .card img{width:100%;border-radius:8px;height:180px;object-fit:cover;}
        .price{color:#33ff00;font-size:20px;font-weight:bold;margin:10px 0;}
        button{width:100%;padding:12px;background:#33ff00;border:none;border-radius:8px;font-weight:bold;cursor:pointer;color:black;}
        #status{text-align:center;color:#888;margin-bottom:20px;}
    </style>
</head>
<body>

<h1>GAME HAVEN</h1>
<div id="status">Status: Initializing...</div>
<div id="accounts" class="grid"></div>

<script>
// Log to check if Supabase loaded
console.log("Checking Supabase library...", window.supabase);

const supabase = window.supabase.createClient(
  "https://xuxflsuixgiwdvawhhbi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eGZsc3VpeGdpd2R2YXdoaGJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwOTM1MzksImV4cCI6MjA4ODY2OTUzOX0.pIUE56lEoJXUsCvFIDdyeg8wYL4QeTuEeIr-N4kGV8c"
);

async function loadData() {
    const status = document.getElementById("status");
    const container = document.getElementById("accounts");
    
    status.innerText = "Status: Connecting to Database...";
    
    try {
        const { data, error } = await supabase
            .from('game_accounts')
            .select('*');

        if (error) {
            status.innerText = "Database Error: " + error.message;
            return;
        }

        if (!data || data.length === 0) {
            status.innerText = "Status: Connected. No accounts found.";
            return;
        }

        status.innerText = "Status: Found " + data.length + " items.";
        container.innerHTML = "";

        data.forEach(item => {
            if(!item.is_sold) {
                container.innerHTML += `
                    <div class="card">
                        <img src="${item.image_url || 'https://via.placeholder.com/300x200'}">
                        <h3>${item.title}</h3>
                        <p>${item.game_name}</p>
                        <div class="price">$${item.price}</div>
                        <button onclick="window.open('https://wa.me/234703689704?text=Buy+${item.title}')">BUY NOW</button>
                    </div>
                `;
            }
        });
    } catch (e) {
        status.innerText = "System Error: " + e.message;
    }
}

// Run the function
loadData();
</script>
</body>
</html>
